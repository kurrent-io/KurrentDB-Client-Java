name: tests workflow

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  single_node:
    name: Single node

    strategy:
      fail-fast: false
      matrix:
        test: [Streams, PersistentSubscriptions, Telemetry]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Cloudsmith
        uses: docker/login-action@v3
        with:
          registry: docker.kurrent.io
          username: ${{ secrets.CLOUDSMITH_CICD_USER }}
          password: ${{ secrets.CLOUDSMITH_CICD_TOKEN }}

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.13

      - name: Execute Gradle build
        run: ./gradlew ci --tests ${{ matrix.test }}Tests
        env:
          KURRENTDB_IMAGE: ${{ inputs.image }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: esdb_logs.tar.gz
          path: /tmp/esdb_logs.tar.gz
          if-no-files-found: error

  secure:
    name: Secure

    strategy:
      fail-fast: false
      matrix:
        test: [Streams, PersistentSubscriptions]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Cloudsmith
        uses: docker/login-action@v3
        with:
          registry: docker.kurrent.io
          username: ${{ secrets.CLOUDSMITH_CICD_USER }}
          password: ${{ secrets.CLOUDSMITH_CICD_TOKEN }}

      - name: Generate certificates
        run: docker compose --file configure-tls-for-tests.yml up

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.13

      - name: Execute Gradle build
        run: ./gradlew ci --tests ${{ matrix.test }}Tests
        env:
          KURRENTDB_IMAGE: ${{ inputs.image }}
          SECURE: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: esdb_logs.tar.gz
          path: /tmp/esdb_logs.tar.gz

  cluster:
    name: Cluster

    strategy:
      fail-fast: false
      matrix:
        test: [Streams, PersistentSubscriptions]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Cloudsmith
        uses: docker/login-action@v3
        with:
          registry: docker.kurrent.io
          username: ${{ secrets.CLOUDSMITH_CICD_USER }}
          password: ${{ secrets.CLOUDSMITH_CICD_TOKEN }}

      - name: Set up cluster with Docker Compose
        run: docker compose up -d
        env:
          KURRENTDB_IMAGE: ${{ inputs.image }}

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.13

      - name: Execute Gradle build
        run: ./gradlew ci --tests ${{ matrix.test }}Tests
        env:
          CLUSTER: true
          SECURE: true

      - name: Shutdown cluster
        run: docker compose down