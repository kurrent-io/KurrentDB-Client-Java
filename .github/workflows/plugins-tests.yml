name: enterprise plugins tests workflow

on:
  workflow_call:
    inputs:
      registry:
        required: true
        type: string
      image:
        required: true
        type: string
      tag:
        required: true
        type: string

jobs:
  single_node:
    name: Single Node

    strategy:
      fail-fast: false
      matrix:
        test: [ Plugins ]

    runs-on: ubuntu-latest
    steps:
      - name: Login to Cloudsmith
        uses: docker/login-action@v3
        with:
          registry: docker.eventstore.com
          username: ${{ secrets.CLOUDSMITH_CICD_USER }}
          password: ${{ secrets.CLOUDSMITH_CICD_TOKEN }}

      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.13

      - name: Generate certificates
        run: |
          docker compose --file configure-tls-for-tests.yml up
          docker compose --file configure-user-certs-for-tests.yml up

      - name: Execute Gradle build
        run: ./gradlew ci --tests ${{ matrix.test }}Tests
        env:
          KURRENTDB_IMAGE: ${{inputs.registry}}/${{ inputs.image }}:${{ inputs.tag }}
          SECURE: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: esdb_logs.tar.gz
          path: db-client-java/esdb_logs.tar.gz
          if-no-files-found: error

  cluster:
    name: Cluster

    strategy:
      fail-fast: false
      matrix:
        test: [ Plugins ]

    runs-on: ubuntu-latest
    steps:
      - name: Login to Cloudsmith
        uses: docker/login-action@v3
        with:
          registry: docker.eventstore.com
          username: ${{ secrets.CLOUDSMITH_CICD_USER }}
          password: ${{ secrets.CLOUDSMITH_CICD_TOKEN }}

      - uses: actions/checkout@v4

      - name: Enable plugins
        run: echo "EventStore__Plugins__UserCertificates__Enabled=true" >> vars.env

      - name: Set up cluster with Docker Compose
        run: docker compose up -d
        env:
          KURRENTDB_DOCKER_REGISTRY: ${{ inputs.registry }}
          KURRENTDB_DOCKER_IMAGE: ${{ inputs.image }}
          KURRENTDB_DOCKER_TAG: ${{ inputs.tag }}

      - name: Generate user certificates
        run: docker compose --file configure-user-certs-for-tests.yml up

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.13

      - name: Execute Gradle build
        run: ./gradlew ci --tests ${{ matrix.test }}Tests
        env:
          SECURE: true
          CLUSTER: true

      - name: Shutdown cluster
        run: docker compose down