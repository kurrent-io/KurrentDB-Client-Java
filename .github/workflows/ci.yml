name: CI
on:
  pull_request:
  push:
    branches:
      - trunk
  schedule:
    - cron: '0 0 * * 0'  # Run every Sunday at midnight UTC

jobs:
  build:
    uses: ./.github/workflows/build.yml

  ci:
    name: Tests (CI)
    uses: ./.github/workflows/tests.yml
    with:
      image: ${{ fromJSON(vars.KURRENTDB_DOCKER_IMAGES).ci.fullname }}
    secrets: inherit
